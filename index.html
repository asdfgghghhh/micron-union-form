<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣美光記憶體股份有限公司企業工會 - 入會申請系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }

        /* 表格優化：移除固定高度，改用 padding 讓版面更有彈性 */
        .pdf-table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        .pdf-table th, .pdf-table td { border: 1px solid #374151; padding: 12px 8px; vertical-align: middle; }
        .pdf-table th { background-color: #f9fafb; font-weight: 700; width: 15%; text-align: center; }
        .form-input { width: 100%; border: none; outline: none; background: transparent; }

        /* 修正 PDF 匯出容器樣式 */
        #pdf-export-template { 
            width: 794px; /* A4 標準寬度 */
            background-color: #ffffff; 
            padding: 40px; 
            box-sizing: border-box;
            overflow: hidden;
        }

        #signature-pad { border: 1px dashed #9ca3af; background-color: #f9fafb; width: 300px; height: 120px; display: block; }
    </style>
</head>
<body class="py-4 px-2">

    <script>
        // ... (省略簽名板初始化程式碼) ...

        function executePrint() {
            // 抓取值並同步填入 PDF 模板
            const fields = ['name', 'gender', 'birth', 'id', 'ext', 'unit', 'raddr', 'caddr', 'phone', 'mobile'];
            fields.forEach(f => {
                document.getElementById('p-' + f).innerText = document.getElementById('d-' + f).value || document.getElementById('m-' + f).value || '';
            });

            document.getElementById('p-year').innerText = document.getElementById('roc-year').value;
            document.getElementById('p-month').innerText = document.getElementById('roc-month').value;
            document.getElementById('p-day').innerText = document.getElementById('roc-day').value;

            // 處理簽名
            const sigImg = document.getElementById('pdf-signature-img');
            if (hasSigned) {
                sigImg.src = canvas.toDataURL();
                sigImg.style.display = 'block';
            } else {
                sigImg.style.display = 'none';
            }

            // 【核心修正：調整 PDF 生成參數】
            const element = document.getElementById('pdf-export-template');
            const opt = {
                margin: 0.4, // 設定適當邊距
                filename: '美光工會入會申請書.pdf',
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { 
                    scale: 2,           // 降低 scale 至 2，避免溢出且保持清晰度
                    useCORS: true, 
                    letterRendering: true,
                    windowWidth: 794    // 強制指定視窗寬度為 A4 寬
                },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>

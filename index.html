<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣美光記憶體股份有限公司企業工會 - 入會申請系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght=400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }

        @media print {
            @page { size: portrait; margin: 0; }
            body { background-color: white; margin: 1.0cm; max-height: 100vh; overflow: hidden; }
            .no-print { display: none !important; }
            .print-container { box-shadow: none !important; margin: 0 !important; padding: 0 !important; width: 100% !important; max-width: 100% !important; page-break-inside: avoid; break-inside: avoid; }
            .mobile-form-view { display: none !important; }
            .desktop-table-view { display: block !important; }
            input, select { border: none !important; background: transparent !important; appearance: none; -webkit-appearance: none; }
            table, th, td { border: 1px solid #000 !important; }
            .watermark-bg { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .print-compact { padding: 1rem !important; margin-top: -1px !important; }
            .print-space { margin-bottom: 0.75rem !important; margin-top: 1.5rem !important; }
        }

        .form-input { width: 100%; height: 100%; padding: 8px; outline: none; background: transparent; min-height: 40px; }
        table { border-collapse: collapse; width: 100%; position: relative; z-index: 10; }
        th, td { border: 1px solid #374151; text-align: center; vertical-align: middle; }
        th { background-color: transparent; font-weight: 500; white-space: nowrap; padding: 8px; width: 12%; }
        .watermark-container { position: relative; }
        
        .watermark-bg {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); opacity: 0.04;
            font-size: 150px; font-weight: bold; color: #000; z-index: 1; pointer-events: none; white-space: nowrap; user-select: none;
        }
        #signature-pad { border: 1px dashed #9ca3af; background-color: #f9fafb; cursor: pointer; max-width: 100%; height: 120px; }
        #modal-signature-pad { background-color: #ffffff; cursor: crosshair; touch-action: none; width: 100%; height: 100%; }
    </style>
</head>
<body class="py-4 px-2 md:py-8 md:px-4 flex flex-col justify-center items-center min-h-screen">

    <div id="form-zone" class="print-container bg-white shadow-xl rounded-lg max-w-4xl w-full p-4 md:p-8 relative">
        
        <div class="no-print hidden md:flex absolute top-4 right-4 gap-2">
            <button onclick="clearSignature()" class="px-4 py-2 bg-red-100 text-red-600 rounded hover:bg-red-200 transition text-sm font-medium">清除簽名</button>
            <button onclick="executePrint()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition text-sm font-medium shadow">儲存 / 列印為 PDF</button>
        </div>

        <div class="text-center mb-4 md:mb-6 mt-2 md:mt-4 relative z-10">
            <h1 class="text-xl md:text-3xl font-bold tracking-widest mb-1 md:mb-3">台灣美光記憶體股份有限公司企業工會</h1>
            <h2 class="text-lg md:text-2xl font-medium tracking-widest flex justify-center items-end gap-16"><span>入會申請書</span></h2>
            <div class="text-right text-sm mr-4 mt-1">序<span class="inline-block w-24 border-b border-gray-400 ml-2"></span></div>
        </div>

        <div class="mobile-form-view block md:hidden space-y-4 no-print">
            <div class="bg-gray-50 p-4 rounded-lg space-y-3 border border-gray-200">
                <div><label class="block text-sm font-medium text-gray-700 mb-1">姓 名</label><input type="text" id="m-name" class="w-full border border-gray-300 rounded p-2 text-base bg-white" placeholder="請輸入姓名" oninput="syncData('m-name', 'd-name')"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">性 別</label><select id="m-gender" class="w-full border border-gray-300 rounded p-2 text-base bg-white" onchange="syncData('m-gender', 'd-gender')"><option value="" disabled selected>請選擇</option><option value="男">男</option><option value="女">女</option></select></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">出生年月日</label><input type="date" id="m-birth" class="w-full border border-gray-300 rounded p-2 text-base bg-white" onchange="syncData('m-birth', 'd-birth')"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">工 號</label><input type="text" id="m-id" class="w-full border border-gray-300 rounded p-2 text-base bg-white" placeholder="請輸入工號" oninput="syncData('m-id', 'd-id')"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">公司分機</label><input type="text" id="m-ext" class="w-full border border-gray-300 rounded p-2 text-base bg-white" placeholder="請輸入分機" oninput="syncData('m-ext', 'd-ext')"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">單 位</label><input type="text" id="m-unit" class="w-full border border-gray-300 rounded p-2 text-base bg-white" placeholder="請輸入單位" oninput="syncData('m-unit', 'd-unit')"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">戶籍住址</label><input type="text" id="m-raddr" class="w-full border border-gray-300 rounded p-2 text-base bg-white" placeholder="請輸入戶籍住址" oninput="syncData('m-raddr', 'd-raddr')"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">通訊住址</label><input type="text" id="m-caddr" class="w-full border border-gray-300 rounded p-2 text-base bg-white" placeholder="請輸入通訊住址" oninput="syncData('m-caddr', 'd-caddr')"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">通訊電話</label><input type="tel" id="m-phone" class="w-full border border-gray-300 rounded p-2 text-base bg-white" placeholder="請輸入通訊電話" oninput="syncData('m-phone', 'd-phone')"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">手機號碼</label><input type="tel" id="m-mobile" class="w-full border border-gray-300 rounded p-2 text-base bg-white" placeholder="請輸入手機號碼" oninput="syncData('m-mobile', 'd-mobile')"></div>
            </div>
        </div>

        <div id="desktop-view-zone" class="desktop-table-view hidden md:block watermark-container border border-gray-700">
            <div class="watermark-bg flex flex-col items-center"><span class="text-[120px] md:text-[200px]">m</span><span class="text-[24px] md:text-[40px] -mt-[40px] md:-mt-[60px]">Micron Labor Union</span></div>
            <table>
                <tbody>
                    <tr>
                        <th class="tracking-widest">姓　　名</th>
                        <td><input type="text" id="d-name" class="form-input" placeholder="請輸入姓名" oninput="syncData('d-name', 'm-name')"></td>
                        <th class="tracking-widest">性　　別</th>
                        <td><select id="d-gender" class="form-input text-center bg-transparent" onchange="syncData('d-gender', 'm-gender')"><option value="" disabled selected>請選擇</option><option value="男">男</option><option value="女">女</option></select></td>
                        <th>出生<br>年月日</th>
                        <td><input type="date" id="d-birth" class="form-input text-center" onchange="syncData('d-birth', 'm-birth')"></td>
                    </tr>
                    <tr>
                        <th class="tracking-widest">工　　號</th>
                        <td><input type="text" id="d-id" class="form-input" placeholder="請輸入工號" oninput="syncData('d-id', 'm-id')"></td>
                        <th>公司分機</th>
                        <td><input type="text" id="d-ext" class="form-input" placeholder="請輸入分機" oninput="syncData('d-ext', 'm-ext')"></td>
                        <th class="tracking-widest">單　　位</th>
                        <td><input type="text" id="d-unit" class="form-input" placeholder="請輸入單位" oninput="syncData('d-unit', 'm-unit')"></td>
                    </tr>
                    <tr><th class="tracking-widest">戶籍住址</th><td colspan="5"><input type="text" id="d-raddr" class="form-input text-left" placeholder="請輸入戶籍住址" oninput="syncData('d-raddr', 'm-raddr')"></td></tr>
                    <tr><th class="tracking-widest">通訊住址</th><td colspan="5"><input type="text" id="d-caddr" class="form-input text-left" placeholder="請輸入通訊住址" oninput="syncData('d-caddr', 'm-caddr')"></td></tr>
                    <tr>
                        <th class="tracking-widest">通訊電話</th>
                        <td colspan="2"><input type="tel" id="d-phone" class="form-input text-left" placeholder="請輸入通訊電話" oninput="syncData('d-phone', 'm-phone')"></td>
                        <th class="tracking-widest">手機號碼</th>
                        <td colspan="2"><input type="tel" id="d-mobile" class="form-input text-left" placeholder="請輸入手機號碼" oninput="syncData('d-mobile', 'm-mobile')"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="print-compact border-x border-b border-gray-700 bg-white p-4 md:p-6 relative z-10 -mt-[1px]">
            <p class="leading-relaxed text-sm md:text-base mb-4 font-medium text-gray-800">
                本人同意按工會章程行使權利與義務並同意於加入企業工會成為會員之日起<br class="hidden md:inline">
                由台灣美光記憶體股份有限公司依據工會法於每月薪資代扣工會經常會費(按章<br class="hidden md:inline">
                程規定之會費)，且於本人退會或離開美光後將停止此代扣作業
            </p>
            <div class="print-space flex flex-col sm:flex-row justify-end items-center sm:items-end mt-4 md:mt-6 gap-4">
                <span class="font-medium text-base md:text-lg sm:mb-4">申請人：</span>
                <div class="flex flex-col items-center w-full sm:w-auto">
                    <canvas id="signature-pad" class="rounded w-[300px]" onclick="handleCanvasClick(event)" ontouchstart="handleCanvasClick(event)"></canvas>
                    <span class="text-xs text-gray-500 mt-1 no-print">(請點擊框格進行手寫簽名)</span>
                </div>
                <span class="font-medium text-base md:text-lg sm:mb-4">(簽章)</span>
            </div>
            <div class="flex items-center pt-4 mt-2 border-t border-dashed border-gray-300 md:border-none md:pt-2">
                <span class="font-medium mr-1 md:mr-2 text-sm md:text-base">中華民國</span>
                <input type="text" id="roc-year" class="w-12 md:w-16 border-b border-gray-400 text-center bg-transparent outline-none mx-1 text-sm md:text-lg">
                <span class="font-medium mx-1 text-sm md:text-base">年</span>
                <input type="text" id="roc-month" class="w-8 md:w-12 border-b border-gray-400 text-center bg-transparent outline-none mx-1 text-sm md:text-lg">
                <span class="font-medium mx-1 text-sm md:text-base">月</span>
                <input type="text" id="roc-day" class="w-8 md:w-12 border-b border-gray-400 text-center bg-transparent outline-none mx-1 text-sm md:text-lg">
                <span class="font-medium mx-1 text-sm md:text-base">日</span>
            </div>
        </div>
        <div class="text-right mt-2 text-xs md:text-sm font-medium pr-2 text-gray-800">可將申請書直接投入 502 室信箱</div>

        <div class="no-print flex md:hidden gap-2 mt-6">
            <button onclick="clearSignature()" class="flex-1 py-3 bg-red-100 text-red-600 rounded-lg hover:bg-red-200 transition text-sm font-medium">清除簽名</button>
            <button onclick="executePrint()" class="flex-[2] py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition text-sm font-medium shadow">儲存 / 列印 PDF</button>
        </div>
    </div>


    <div id="signature-modal" class="no-print fixed inset-0 bg-black/80 z-50 flex flex-col justify-between p-4 hidden">
        <div class="flex justify-between items-center text-white pt-2">
            <h3 class="text-lg font-bold tracking-wider">請在下方白色區域內手寫簽名</h3>
            <button onclick="closeSignatureModal()" class="text-gray-400 text-2xl px-2">✕</button>
        </div>
        <div class="flex-1 my-4 bg-white rounded-xl overflow-hidden shadow-inner relative">
            <canvas id="modal-signature-pad"></canvas>
        </div>
        <div class="flex gap-3 pb-2">
            <button onclick="clearModalSignature()" class="flex-1 py-3.5 bg-gray-700 text-gray-200 font-medium rounded-xl transition text-base">重填清除</button>
            <button onclick="saveModalSignature()" class="flex-[2] py-3.5 bg-emerald-600 text-white font-bold rounded-xl transition text-base shadow-lg">確認完成簽名</button>
        </div>
    </div>


    <script>
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d');
        const modal = document.getElementById('signature-modal');
        const mCanvas = document.getElementById('modal-signature-pad');
        const mCtx = mCanvas.getContext('2d');

        let isDrawing = false;
        let isMDrawing = false;

        window.onload = function() {
            initMainCanvas();
        };

        window.onresize = function() {
            initMainCanvas();
        };

        // 初始化主畫布尺寸
        function initMainCanvas() {
            canvas.width = 300;
            canvas.height = 120;
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 2.5;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
        }

        // 智能判斷：手機點擊開啟彈出視窗；電腦桌機直接在原地畫
        function handleCanvasClick(e) {
            if (window.innerWidth < 1024) {
                e.preventDefault();
                openSignatureModal();
            }
        }

        // 開啟全螢幕簽名視窗
        function openSignatureModal() {
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // 鎖定網頁背景不亂滾
            
            // 實體寬高重設，清除任何拉伸
            mCanvas.width = mCanvas.offsetWidth;
            mCanvas.height = mCanvas.offsetHeight;
            
            mCtx.strokeStyle = '#000000';
            mCtx.lineWidth = 4; // 手指簽名加粗更滑順
            mCtx.lineJoin = 'round';
            mCtx.lineCap = 'round';
        }

        function closeSignatureModal() {
            modal.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // 取得精準的觸控/滑鼠坐標
        function getPos(e, c) {
            const rect = c.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        // 桌機版滑鼠原地簽名事件綁定
        canvas.addEventListener('mousedown', (e) => {
            if (window.innerWidth < 1024) return;
            isDrawing = true;
            const p = getPos(e, canvas);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
        });
        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing || window.innerWidth < 1024) return;
            const p = getPos(e, canvas);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
        });
        window.addEventListener('mouseup', () => { isDrawing = false; });

        // 全螢幕大畫布觸控事件綁定 (保證絕對有線條)
        mCanvas.addEventListener('touchstart', (e) => {
            isMDrawing = true;
            const p = getPos(e, mCanvas);
            mCtx.beginPath();
            mCtx.moveTo(p.x, p.y);
        }, { passive: false });

        mCanvas.addEventListener('touchmove', (e) => {
            if (!isMDrawing) return;
            e.preventDefault(); // 阻斷瀏覽器預設捲動
            const p = getPos(e, mCanvas);
            mCtx.lineTo(p.x, p.y);
            mCtx.stroke();
        }, { passive: false });

        window.addEventListener('touchend', () => { isMDrawing = false; });

        // 清除功能
        function clearSignature() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
        function clearModalSignature() { mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height); }

        // 確認完成：完美等比例壓縮帶回原本的 A4 表格格子
        function saveModalSignature() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 完美將大畫布內容縮小畫入主畫布中
            ctx.drawImage(mCanvas, 0, 0, canvas.width, canvas.height);
            closeSignatureModal();
        }

        // 欄位同步與日期
        function syncData(sourceId, targetId) {
            const src = document.getElementById(sourceId);
            const tgt = document.getElementById(targetId);
            if (src && tgt) tgt.value = src.value;
        }

        const today = new Date();
        document.getElementById('roc-year').value = today.getFullYear() - 1911;
        document.getElementById('roc-month').value = today.getMonth() + 1;
        document.getElementById('roc-day').value = today.getDate();

        function executePrint() {
            canvas.style.border = 'none';
            canvas.style.borderBottom = '1px solid black';
            window.print();
            setTimeout(() => { canvas.style.border = '1px dashed #9ca3af'; }, 150);
        }
    </script>
</body>
</html>

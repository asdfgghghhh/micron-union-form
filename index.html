<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入會申請書</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; padding: 20px; }
        .form-input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .date-input { width: 60px; border: none; border-bottom: 1px solid #000; text-align: center; background: transparent; outline: none; }
        
        .watermark-overlay { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; opacity: 0.1; 
            pointer-events: none; z-index: 0; 
        }
        .main-form-content { position: relative; z-index: 10; }
        #signature-display { 
            min-height: 96px; cursor: pointer; display: flex; align-items: center; justify-content: center; 
            background: white; border-2 border-dashed #ccc; border-radius: 4px; color: #999; 
            transition: all 0.3s;
        }
        #signature-display:hover { background-color: #f9fafb; }
        #signature-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        #signature-pad { touch-action: none; background: white; width: 90vw; max-width: 500px; height: 250px; border: 1px solid #000; }
        
        .platform-badge {
            position: fixed; top: 10px; right: 10px; padding: 6px 12px; border-radius: 20px; 
            color: white; font-size: 12px; font-weight: bold; z-index: 999;
        }
        .badge-android { background-color: #3DDC84; }
        .badge-ios { background-color: #555555; }
        .badge-desktop { background-color: #4CAF50; }
        
        .button-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-primary { flex: 1; padding: 12px; border-radius: 6px; font-weight: bold; border: none; cursor: pointer; transition: all 0.3s; min-width: 150px; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .btn-android { background-color: #3DDC84; color: #fff; }
        .btn-ios { background-color: #555555; color: #fff; }
        .btn-desktop { background-color: #4CAF50; color: #fff; }
        .btn-secondary { background-color: #6B7280; color: #fff; flex: 1; }
        
        @media print {
            #action-buttons-area { display: none !important; }
            .platform-badge { display: none !important; }
            body { background: white; padding: 0; }
            input, select { border: none !important; border-bottom: 1px solid #000 !important; border-radius: 0 !important; }
        }
        
        @media (max-width: 640px) {
            .button-group { flex-direction: column; }
            .btn-primary { width: 100%; }
        }
    </style>
</head>
<body>

<div id="platform-badge" class="platform-badge"></div>

<div id="form-to-pdf" class="max-w-2xl mx-auto bg-white p-8 shadow-xl relative">
    <div class="watermark-overlay">
        <div style="font-size: 150px; font-weight: bold; color: #000; line-height: 1;">m</div>
        <div style="font-size: 30px; font-weight: bold; color: #000;">Micron Labor Union</div>
    </div>

    <div class="main-form-content">
        <h1 class="text-xl font-bold text-center mb-6">台灣美光記憶體股份有限公司企業工會 - 入會申請書</h1>
        <div class="space-y-4 text-sm">
            <div class="grid grid-cols-2 gap-4">
                <div>姓名<input type="text" class="form-input"></div>
                <div>性別<select class="form-input"><option>男</option><option>女</option></select></div>
            </div>
            <div>出生年月日<input type="date" class="form-input"></div>
            <div class="grid grid-cols-3 gap-2">
                <div>工號<input type="text" class="form-input"></div>
                <div>分機<input type="text" class="form-input"></div>
                <div>單位<input type="text" class="form-input"></div>
            </div>
            <div>戶籍地址<input type="text" class="form-input"></div>
            <div>通訊地址<input type="text" class="form-input"></div>
            <div>手機<input type="tel" class="form-input"></div>
            
            <div class="p-4 bg-gray-50 border rounded text-xs leading-relaxed">
                本人同意按工會章程行使權利與義務並同意於加入企業工會成為會員之日起由台灣美光記憶體股份有限公司依據工會法於每月薪資代扣工會會費。
            </div>
            
            <div class="flex flex-col items-center pt-4">
                <span class="font-bold mb-2">申請人簽名：</span>
                <div id="signature-display" onclick="openModal()" class="w-full">
                    點擊此處進行簽名
                </div>
                <div class="mt-6 font-bold">
                    中華民國 <input type="number" class="date-input"> 年 
                    <input type="number" class="date-input"> 月 
                    <input type="number" class="date-input"> 日
                </div>
            </div>
        </div>

        <div id="action-buttons-area" class="mt-8">
            <div id="button-container" class="button-group"></div>
        </div>
    </div>
</div>

<div id="signature-modal">
    <div class="bg-white p-4 rounded-lg">
        <canvas id="signature-pad"></canvas>
        <div class="flex justify-end gap-2 mt-4">
            <button onclick="closeModal()" class="px-4 py-2 bg-gray-300 rounded">取消</button>
            <button onclick="clearCanvas()" class="px-4 py-2 bg-red-500 text-white rounded">清除</button>
            <button onclick="saveSignature()" class="px-4 py-2 bg-blue-600 text-white rounded">確定</button>
        </div>
    </div>
</div>

<script>
    const modal = document.getElementById('signature-modal');
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    function openModal() { 
        modal.style.display = 'flex'; 
        canvas.width = canvas.offsetWidth; 
        canvas.height = canvas.offsetHeight; 
        ctx.lineWidth = 3; 
        ctx.lineJoin = 'round'; 
    }
    function closeModal() { modal.style.display = 'none'; }
    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    function saveSignature() { 
        const display = document.getElementById('signature-display'); 
        display.innerHTML = `<img src="${canvas.toDataURL()}" style="max-height:80px; width:auto;">`; 
        closeModal(); 
    }

    // 簽名邏輯
    canvas.addEventListener('mousedown', (e) => { isDrawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
    canvas.addEventListener('mousemove', (e) => { if (isDrawing) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); } });
    window.addEventListener('mouseup', () => isDrawing = false);
    
    // 觸摸支持
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); const touch = e.touches[0]; const rect = canvas.getBoundingClientRect(); const x = touch.clientX - rect.left; const y = touch.clientY - rect.top; isDrawing = true; ctx.beginPath(); ctx.moveTo(x, y); }, {passive: false});
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (!isDrawing) return; const touch = e.touches[0]; const rect = canvas.getBoundingClientRect(); const x = touch.clientX - rect.left; const y = touch.clientY - rect.top; ctx.lineTo(x, y); ctx.stroke(); }, {passive: false});
    canvas.addEventListener('touchend', () => { isDrawing = false; });

    // ===== 平台偵測 =====
    function getPlatform() {
        const ua = navigator.userAgent.toLowerCase();
        if (/android/.test(ua)) return 'android';
        if (/iphone|ipad|ipod/.test(ua)) return 'ios';
        return 'desktop';
    }

    // ===== UI 初始化 =====
    function initializeUI() {
        const platform = getPlatform();
        const badge = document.getElementById('platform-badge');
        const container = document.getElementById('button-container');
        
        // 設定平台徽章
        const badgeLabels = { android: 'Android', ios: 'iOS', desktop: 'Desktop' };
        const badgeClasses = { android: 'badge-android', ios: 'badge-ios', desktop: 'badge-desktop' };
        badge.textContent = badgeLabels[platform];
        badge.className = `platform-badge ${badgeClasses[platform]}`;
        
        // 根據平台生成按鈕
        container.innerHTML = getButtonsForPlatform(platform);
    }

    function getButtonsForPlatform(platform) {
        if (platform === 'android') {
            return `
                <button onclick="generatePDFAndroid()" class="btn-primary btn-android">📥 下載 PDF</button>
                <button onclick="window.print()" class="btn-primary btn-secondary">🖨️ 列印</button>
            `;
        } else if (platform === 'ios') {
            return `
                <button onclick="generatePDFiOS()" class="btn-primary btn-ios">📥 生成並分享 PDF</button>
                <button onclick="window.print()" class="btn-primary btn-secondary">🖨️ 列印</button>
            `;
        } else {
            return `
                <button onclick="generatePDFDesktop()" class="btn-primary btn-desktop">💾 下載 PDF</button>
                <button onclick="window.print()" class="btn-primary btn-secondary">🖨️ 列印</button>
            `;
        }
    }

    // ===== PDF 生成函數 =====
    function syncFormData() {
        document.querySelectorAll('input, select').forEach(el => {
            el.setAttribute('value', el.value);
        });
    }

    function getFileName() {
        const nameInput = document.querySelector('input[type="text"]');
        return nameInput.value ? `入會申請書_${nameInput.value}.pdf` : '入會申請書.pdf';
    }

    function generatePDFAndroid() {
        syncFormData();
        const element = document.getElementById('form-to-pdf');
        const opt = {
            margin: 10,
            filename: getFileName(),
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2, useCORS: true, ignoreElements: (el) => el.id === 'action-buttons-area' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
        alert('PDF 已開始下載到您的下載文件夾');
    }

    function generatePDFiOS() {
        syncFormData();
        const element = document.getElementById('form-to-pdf');
        const opt = {
            margin: 10,
            filename: getFileName(),
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2, useCORS: true, ignoreElements: (el) => el.id === 'action-buttons-area' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        
        html2pdf().set(opt).from(element).toPdf().get('pdf').then((pdf) => {
            const pdfBlob = pdf.output('blob');
            const url = URL.createObjectURL(pdfBlob);
            
            // iOS: 嘗試使用 Web Share API
            if (navigator.share) {
                const fileName = getFileName();
                const file = new File([pdfBlob], fileName, { type: 'application/pdf' });
                navigator.share({
                    files: [file],
                    title: '入會申請書',
                    text: '台灣美光企業工會入會申請書'
                }).catch((err) => {
                    if (err.name !== 'AbortError') {
                        console.log('分享失敗，使用回退方案', err);
                        // 回退: 在新分頁打開 PDF
                        window.open(url, '_blank');
                    }
                });
            } else {
                // 回退: 在新分頁打開 PDF
                alert('您的設備不支持分享功能，PDF 將在新分頁打開');
                window.open(url, '_blank');
            }
        });
    }

    function generatePDFDesktop() {
        syncFormData();
        const element = document.getElementById('form-to-pdf');
        const opt = {
            margin: 10,
            filename: getFileName(),
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { scale: 2, useCORS: true, ignoreElements: (el) => el.id === 'action-buttons-area' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    // 頁面加載時初始化
    document.addEventListener('DOMContentLoaded', initializeUI);
</script>
</body>
</html>

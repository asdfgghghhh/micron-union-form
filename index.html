<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入會申請書</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 html2pdf.js 套件 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; padding: 20px; }
        .form-input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .date-input { width: 60px; border: none; border-bottom: 1px solid #000; text-align: center; background: transparent; outline: none; }
        
        /* 浮水印：強制充滿容器並垂直水平置中 */
        .watermark-overlay { 
            position: absolute;
            inset: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            opacity: 0.1; 
            pointer-events: none; 
            z-index: 0; 
        }
        
        .main-form-content { position: relative; z-index: 10; }
        #signature-display { pointer-events: auto; z-index: 20; cursor: pointer; }
        
        #signature-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        #signature-pad { touch-action: none; background: white; width: 90vw; max-width: 500px; height: 250px; border: 1px solid #000; }
        
        @media print {
            @page { margin: 5mm !important; size: auto; }
            body { background: white !important; padding: 0; }
            .no-print { display: none !important; }
            .print-container { box-shadow: none !important; max-width: 100% !important; margin: 0 !important; }
            .watermark-overlay { opacity: 0.1 !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div id="form-to-pdf" class="print-container max-w-2xl mx-auto bg-white p-8 shadow-xl relative">
    
    <div class="watermark-overlay">
        <div style="font-size: 150px; font-weight: bold; color: #000; line-height: 1;">m</div>
        <div style="font-size: 30px; font-weight: bold; color: #000;">Micron Labor Union</div>
    </div>

    <div class="main-form-content">
        <h1 class="text-xl font-bold text-center mb-6">台灣美光記憶體股份有限公司企業工會 - 入會申請書</h1>
        <div class="space-y-4 text-sm">
            <div class="grid grid-cols-2 gap-4">
                <div>姓名<input type="text" class="form-input bg-white/70"></div>
                <div>性別<select class="form-input bg-white/70"><option>男</option><option>女</option></select></div>
            </div>
            <div>出生年月日<input type="date" class="form-input bg-white/70"></div>
            <div class="grid grid-cols-3 gap-2">
                <div>工號<input type="text" class="form-input bg-white/70"></div>
                <div>分機<input type="text" class="form-input bg-white/70"></div>
                <div>單位<input type="text" class="form-input bg-white/70"></div>
            </div>
            <div>戶籍地址<input type="text" class="form-input bg-white/70"></div>
            <div>通訊地址<input type="text" class="form-input bg-white/70"></div>
            <div>手機<input type="tel" class="form-input bg-white/70"></div>
            
            <div class="p-4 bg-gray-50/70 border rounded text-xs leading-relaxed">
                本人同意按工會章程行使權利與義務並同意於加入企業工會成為會員之日起由台灣美光記憶體股份有限公司依據工會法於每月薪資代扣工會經常會費(按章程規定之會費)，且於本人退會或離開美光後將停止此代扣作業。
            </div>
            
            <div class="flex flex-col items-center pt-4">
                <span class="font-bold mb-2">申請人簽名：</span>
                <div id="signature-display" onclick="openModal()" class="w-full h-24 border-2 border-dashed flex items-center justify-center text-gray-400 bg-white hover:bg-gray-50 transition">
                    點擊此處進行簽名
                </div>
                <div class="mt-6 font-bold">
                    中華民國 <input type="number" class="date-input" placeholder="___"> 年 
                    <input type="number" class="date-input" placeholder="__"> 月 
                    <input type="number" class="date-input" placeholder="__"> 日
                </div>
            </div>
        </div>
        
        <!-- 給按鈕區塊加上 id="action-buttons-area" 方便 JS 排除它 -->
        <div id="action-buttons-area" class="no-print mt-8 flex gap-4">
            <button onclick="window.print()" class="flex-1 bg-gray-600 text-white py-2 rounded font-bold hover:bg-gray-700 transition">傳統列印</button>
            <button onclick="generatePDF()" class="flex-1 bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700 transition">生成並下載 PDF</button>
        </div>
    </div>
</div>

<div id="signature-modal">
    <div class="bg-white p-4 rounded-lg relative">
        <canvas id="signature-pad"></canvas>
        <div class="flex justify-end gap-2 mt-4">
            <button onclick="closeModal()" class="px-4 py-2 bg-gray-300 rounded">取消</button>
            <button onclick="clearCanvas()" class="px-4 py-2 bg-red-500 text-white rounded">清除</button>
            <button onclick="saveSignature()" class="px-4 py-2 bg-blue-600 text-white rounded">確定</button>
        </div>
    </div>
</div>

<script>
    // --- 簽名板核心邏輯 ---
    const modal = document.getElementById('signature-modal');
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    function openModal() { 
        modal.style.display = 'flex'; 
        canvas.width = canvas.offsetWidth; 
        canvas.height = canvas.offsetHeight; 
        ctx.strokeStyle = '#000000'; 
        ctx.lineWidth = 3; 
        ctx.lineJoin = 'round'; 
        ctx.lineCap = 'round';
    }
    function closeModal() { modal.style.display = 'none'; }
    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    function saveSignature() { 
        const display = document.getElementById('signature-display'); 
        display.innerHTML = `<img src="${canvas.toDataURL()}" class="h-full object-contain">`; 
        closeModal(); 
    }
    function getPos(e) { 
        const r = canvas.getBoundingClientRect(); 
        return { 
            x: (e.touches ? e.touches[0].clientX : e.clientX) - r.left, 
            y: (e.touches ? e.touches[0].clientY : e.clientY) - r.top 
        }; 
    }
    
    canvas.addEventListener('mousedown', (e) => { isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
    canvas.addEventListener('mousemove', (e) => { if (!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
    window.addEventListener('mouseup', () => isDrawing = false);
    
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }, { passive: false });
    window.addEventListener('touchend', () => isDrawing = false);

    // --- 修改後的 PDF 生成邏輯 ---
    function generatePDF() {
        const element = document.getElementById('form-to-pdf');
        
        const nameInput = document.querySelector('input[type="text"]');
        const fileName = nameInput && nameInput.value ? `入會申請書_${nameInput.value}.pdf` : '入會申請書.pdf';

        const opt = {
            margin:       [10, 10, 10, 10], 
            filename:     fileName,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { 
                scale: 2,           
                useCORS: true,      
                letterRendering: true,
                // 【關鍵修正】這行會在渲染前，把 id 為 action-buttons-area 的按鈕列直接剔除
                ignoreElements: (element) => element.id === 'action-buttons-area'
            },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' } 
        };

        html2pdf().set(opt).from(element).save();
    }
</script>
</body>
</html>

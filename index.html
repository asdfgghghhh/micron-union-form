<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入會申請書</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; }
        .watermark { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; opacity: 0.05; pointer-events: none; user-select: none; z-index: 0; }
        .form-input { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
        
        .date-input { width: 50px; border: none; border-bottom: 1px solid #000; text-align: center; background: transparent; outline: none; }
        .date-input:focus { border-bottom: 2px solid #2563eb; }
        
        #signature-pad { touch-action: none; width: 100%; max-width: 300px; height: 80px; border: 1px dashed #999; }
        
        @media print {
            @page { margin: 5mm !important; size: auto; }
            body { background: white !important; padding: 0 !important; margin: 0 !important; }
            .no-print { display: none !important; }
            .print-container { box-shadow: none !important; margin: auto !important; width: 100% !important; max-width: 600px !important; }
            .date-input { border-bottom: 1px solid #000 !important; }
        }
    </style>
</head>
<body>
    <div class="print-container bg-white shadow-xl w-full max-w-2xl p-6 relative overflow-hidden">
        <div class="watermark"><div class="flex flex-col items-center rotate-[-20deg]"><span style="font-size: 150px; font-weight: bold;">m</span><span style="font-size: 30px;">Micron Labor Union</span></div></div>
        
        <div class="no-print flex justify-end gap-2 mb-4">
            <button onclick="ctx.clearRect(0,0,canvas.width,canvas.height)" class="px-3 py-1 bg-gray-200 text-sm">清除簽名</button>
            <button onclick="window.print()" class="px-3 py-1 bg-blue-600 text-white text-sm">列印</button>
        </div>

        <div class="relative z-10">
            <h1 class="text-xl font-bold text-center mb-5">台灣美光記憶體股份有限公司企業工會 - 入會申請書</h1>
            <div class="space-y-3 text-sm">
                <div class="grid grid-cols-2 gap-2">
                    <div>姓名<input type="text" class="form-input"></div>
                    <div>性別<select class="form-input"><option>男</option><option>女</option></select></div>
                </div>
                <div>出生年月日<input type="date" class="form-input"></div>
                <div class="grid grid-cols-3 gap-2">
                    <div>工號<input type="text" class="form-input"></div>
                    <div>分機<input type="text" class="form-input"></div>
                    <div>單位<input type="text" class="form-input"></div>
                </div>
                <div>戶籍地址<input type="text" class="form-input"></div>
                <div>通訊地址<input type="text" class="form-input"></div>
                <div>手機<input type="tel" class="form-input"></div>
                
                <div class="p-3 bg-gray-50 border rounded text-xs leading-relaxed">
                    本人同意按工會章程行使權利與義務並同意於加入企業工會成為會員之日起由台灣美光記憶體股份有限公司依據工會法於每月薪資代扣工會經常會費(按章程規定之會費)，且於本人退會或離開美光後將停止此代扣作業。
                </div>
                
                <div class="flex flex-col items-center pt-2 space-y-4">
                    <div class="flex flex-col items-center">
                        <span class="font-bold mb-1">申請人簽名：</span>
                        <canvas id="signature-pad" class="bg-gray-50"></canvas>
                    </div>
                    <div class="text-center font-bold">
                        中  華  民  國 <input type="number" class="date-input" placeholder="___"> 年 
                        <input type="number" class="date-input" placeholder="__"> 月 
                        <input type="number" class="date-input" placeholder="__"> 日
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        ctx.lineWidth = 2;
        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
        });
        window.addEventListener('mouseup', () => { isDrawing = false; ctx.beginPath(); });
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; ctx.beginPath(); e.preventDefault(); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { 
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top);
            ctx.stroke(); 
            e.preventDefault(); 
        }, {passive: false});
    </script>
</body>
</html>

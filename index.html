<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣美光記憶體股份有限公司企業工會 - 入會申請系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        .pdf-table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        .pdf-table th, .pdf-table td { border: 1px solid #374151; height: 45px; padding: 5px; }
        .pdf-table th { background: #f9fafb; font-weight: 700; width: 15%; }
        
        /* 修正 PDF 隱藏容器 */
        .pdf-hidden-container {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -9999;
            opacity: 0;
            pointer-events: none;
            width: 794px;
        }
    </style>
</head>
<body class="p-4">
    <div id="form-zone" class="bg-white shadow-xl rounded-lg max-w-4xl mx-auto p-8">
        <h1 class="text-2xl font-bold text-center mb-6">台灣美光記憶體股份有限公司企業工會 - 入會申請書</h1>
        
        <!-- 輸入區塊 -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <input type="text" id="m-name" placeholder="姓名" class="border p-2" oninput="syncData()">
            <input type="text" id="m-id" placeholder="工號" class="border p-2" oninput="syncData()">
            <input type="date" id="m-birth" class="border p-2" onchange="syncData()">
            <input type="text" id="m-unit" placeholder="單位" class="border p-2" oninput="syncData()">
        </div>
        
        <canvas id="signature-pad" class="border w-full h-32 mb-4" style="touch-action: none;"></canvas>
        <button onclick="executePrint()" class="w-full bg-emerald-600 text-white py-4 rounded-lg font-bold">儲存 / 生成完美 PDF</button>
    </div>

    <!-- 實際生成 PDF 的隱藏模板 -->
    <div id="pdf-export-template" class="pdf-hidden-container">
        <div style="padding: 40px; background: white;">
            <h1 style="text-align: center; font-size: 24px;">台灣美光記憶體股份有限公司企業工會</h1>
            <h2 style="text-align: center;">入會申請書</h2>
            <table class="pdf-table">
                <tr><th>姓名</th><td id="p-name"></td><th>工號</th><td id="p-id"></td></tr>
                <tr><th>出生年月日</th><td id="p-birth"></td><th>單位</th><td id="p-unit"></td></tr>
            </table>
            <div style="margin-top: 20px;">
                <p>簽名：</p>
                <img id="pdf-signature-img" style="width: 200px; height: 80px; border-bottom: 1px solid #000;" src="" alt="">
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d');
        let hasSigned = false;

        // 簡單繪圖邏輯
        canvas.addEventListener('mousedown', () => hasSigned = true);
        
        function syncData() {
            document.getElementById('p-name').innerText = document.getElementById('m-name').value;
            document.getElementById('p-id').innerText = document.getElementById('m-id').value;
            document.getElementById('p-birth').innerText = document.getElementById('m-birth').value;
            document.getElementById('p-unit').innerText = document.getElementById('m-unit').value;
        }

        async function executePrint() {
            const sigImg = document.getElementById('pdf-signature-img');
            if (hasSigned) sigImg.src = canvas.toDataURL();
            
            // 等待 DOM 更新
            await new Promise(r => setTimeout(r, 500));
            
            const element = document.getElementById('pdf-export-template');
            html2pdf().from(element).set({
                margin: 0.5,
                filename: '申請書.pdf',
                html2canvas: { scale: 2 }
            }).save();
        }
    </script>
</body>
</html>

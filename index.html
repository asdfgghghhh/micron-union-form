<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>入會申請書</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* PDF 輸出專用樣式 */
        @media print { body { background: none; padding: 0; } }
        .a4-page { width: 794px; background: white; margin: auto; padding: 50px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; border: 2px solid #000; }
        th, td { border: 1px solid #000; padding: 12px; height: 50px; vertical-align: middle; }
        th { background-color: #f3f4f6; text-align: center; font-weight: bold; width: 15%; }
        input, select { border: none; width: 100%; outline: none; font-size: 16px; }
        .sig-container { border: 1px dashed #666; width: 280px; height: 100px; display: inline-block; cursor: crosshair; }
    </style>
</head>
<body class="bg-gray-100 py-10">

<div class="max-w-[850px] mx-auto">
    <div class="flex justify-end gap-3 mb-6">
        <button onclick="clearCanvas()" class="px-5 py-2 bg-gray-200 rounded hover:bg-gray-300">清除簽名</button>
        <button onclick="generatePDF()" class="px-5 py-2 bg-blue-800 text-white font-bold rounded shadow hover:bg-blue-900">下載專業 PDF</button>
    </div>

    <div id="pdf-content" class="a4-page shadow-2xl">
        <h1 class="text-2xl font-bold text-center mb-1">台灣美光記憶體股份有限公司企業工會</h1>
        <h2 class="text-xl font-bold text-center mb-8">入會申請書</h2>

        <table>
            <tr><th>姓名</th><td><input type="text"></td><th>性別</th><td><select><option>男</option><option>女</option></select></td><th>出生年月日</th><td><input type="date"></td></tr>
            <tr><th>工號</th><td><input type="text"></td><th>公司分機</th><td><input type="text"></td><th>單位</th><td><input type="text"></td></tr>
            <tr><th>戶籍住址</th><td colspan="5"><input type="text"></td></tr>
            <tr><th>通訊住址</th><td colspan="5"><input type="text"></td></tr>
            <tr><th>通訊電話</th><td><input type="text"></td><th>手機號碼</th><td colspan="3"><input type="text"></td></tr>
        </table>

        <div class="border-2 border-black p-6 mt-4">
            <p class="mb-10 leading-relaxed font-medium">本人同意按工會章程行使權利與義務並同意於加入企業工會成為會員之日起，由台灣美光記憶體股份有限公司依據工會法於每月薪資代扣工會經常會費(按章程規定之會費)，且於本人退會或離開美光後將停止此代扣作業。</p>
            <div class="flex items-center gap-4">
                <span class="font-bold text-lg">申請人親筆簽名：</span>
                <canvas id="sig-pad" class="sig-container"></canvas>
                <span class="font-bold text-lg">(簽章)</span>
            </div>
            <div class="mt-8 font-bold">
                中華民國 115 年 5 月 20 日
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('sig-pad');
    const ctx = canvas.getContext('2d');
    let drawing = false;

    canvas.onmousedown = () => drawing = true;
    canvas.onmouseup = () => { drawing = false; ctx.beginPath(); }
    canvas.onmousemove = (e) => {
        if(!drawing) return;
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
    };

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function generatePDF() {
        const element = document.getElementById('pdf-content');
        const opt = {
            margin: 0.2,
            filename: '美光工會入會申請書.pdf',
            image: { type: 'jpeg', quality: 1.0 },
            html2canvas: { scale: 3, letterRendering: true }, // scale 3 確保文字清晰
            jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>
</body>
</html>

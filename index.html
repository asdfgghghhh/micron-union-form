<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>入會申請書</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        * { box-sizing: border-box; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; padding: 10px; }
        .form-input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .date-input { width: 60px; border: none; border-bottom: 1px solid #000; text-align: center; background: transparent; outline: none; }
        
        .watermark-overlay { 
            position: absolute; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; opacity: 0.1; 
            pointer-events: none; z-index: 0; 
        }
        .main-form-content { position: relative; z-index: 10; }
        #signature-display { min-height: 96px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: white; touch-action: none; }
        #signature-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        #signature-pad { touch-action: none; background: white; width: 90vw; max-width: 500px; height: 250px; border: 1px solid #000; cursor: crosshair; }

        @media print {
            #action-buttons-area { display: none !important; }
            body { background: white; padding: 0; }
            input, select { border: none !important; border-bottom: 1px solid #000 !important; border-radius: 0 !important; }
        }
    </style>
</head>
<body>

<div id="form-to-pdf" class="max-w-2xl mx-auto bg-white p-8 shadow-xl relative overflow-visible">
    <div class="watermark-overlay">
        <div style="font-size: 150px; font-weight: bold; color: #000; line-height: 1;">m</div>
        <div style="font-size: 30px; font-weight: bold; color: #000;">Micron Labor Union</div>
    </div>

    <div class="main-form-content">
        <h1 class="text-xl font-bold text-center mb-6">台灣美光記憶體股份有限公司企業工會 - 入會申請書</h1>
        <div class="space-y-4 text-sm">
            <div class="grid grid-cols-2 gap-4">
                <div>姓名<input type="text" class="form-input"></div>
                <div>性別<select class="form-input"><option>男</option><option>女</option></select></div>
            </div>
            <div>出生年月日<input type="date" class="form-input"></div>
            <div class="grid grid-cols-3 gap-2">
                <div>工號<input type="text" class="form-input"></div>
                <div>分機<input type="text" class="form-input"></div>
                <div>單位<input type="text" class="form-input"></div>
            </div>
            <div>戶籍地址<input type="text" class="form-input"></div>
            <div>通訊地址<input type="text" class="form-input"></div>
            <div>手機<input type="tel" class="form-input"></div>
            
            <div class="p-4 bg-gray-50 border rounded text-xs leading-relaxed">
                本人同意按工會章程行使權利與義務並同意於加入企業工會成為會員之日起由台灣美光記憶體股份有限公司依據工會法於每月薪資代扣工會經常會費(按章程規定之會費)，且於本人退會或離開美光後將停止此代扣作業。
            </div>
            
            <div class="flex flex-col items-center pt-4">
                <span class="font-bold mb-2">申請人簽名：</span>
                <div id="signature-display" onclick="openModal()" class="w-full border-2 border-dashed text-gray-400 hover:bg-gray-50">
                    點擊此處進行簽名
                </div>
                <div class="mt-6 font-bold">
                    中華民國 <input type="number" class="date-input"> 年 
                    <input type="number" class="date-input"> 月 
                    <input type="number" class="date-input"> 日
                </div>
            </div>
        </div>

        <div id="action-buttons-area" class="mt-8 flex gap-4">
            <button onclick="window.print()" class="flex-1 bg-gray-600 text-white py-2 rounded font-bold">傳統列印</button>
            <button onclick="generatePDF()" class="flex-1 bg-blue-600 text-white py-2 rounded font-bold">生成並下載 PDF</button>
        </div>
    </div>
</div>

<div id="signature-modal">
    <div class="bg-white p-4 rounded-lg">
        <canvas id="signature-pad"></canvas>
        <div class="flex justify-end gap-2 mt-4">
            <button onclick="closeModal()" class="px-4 py-2 bg-gray-300 rounded">取消</button>
            <button onclick="clearCanvas()" class="px-4 py-2 bg-red-500 text-white rounded">清除</button>
            <button onclick="saveSignature()" class="px-4 py-2 bg-blue-600 text-white rounded">確定</button>
        </div>
    </div>
</div>

<script>
    const modal = document.getElementById('signature-modal');
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    function openModal() { 
        modal.style.display = 'flex'; 
        canvas.width = canvas.offsetWidth; 
        canvas.height = canvas.offsetHeight; 
        ctx.strokeStyle = '#000000'; 
        ctx.lineWidth = 3; 
        ctx.lineJoin = 'round'; 
    }
    function closeModal() { modal.style.display = 'none'; }
    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    function saveSignature() { 
        const display = document.getElementById('signature-display'); 
        display.innerHTML = `<img src="${canvas.toDataURL()}" style="max-height:80px; width:auto;">`; 
        closeModal(); 
    }

    function getPos(e) { 
        const rect = canvas.getBoundingClientRect(); 
        const clientX = e.touches ? e.touches[0].clientX : e.clientX; 
        const clientY = e.touches ? e.touches[0].clientY : e.clientY; 
        return { x: clientX - rect.left, y: clientY - rect.top }; 
    }
    
    function startDrawing(e) { 
        isDrawing = true; 
        const pos = getPos(e); 
        ctx.beginPath(); 
        ctx.moveTo(pos.x, pos.y); 
    }
    
    function draw(e) { 
        if (!isDrawing) return; 
        const pos = getPos(e); 
        ctx.lineTo(pos.x, pos.y); 
        ctx.stroke(); 
    }

    canvas.addEventListener('mousedown', startDrawing); 
    canvas.addEventListener('mousemove', draw); 
    window.addEventListener('mouseup', () => isDrawing = false);
    
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); }, {passive: false}); 
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, {passive: false}); 
    canvas.addEventListener('touchend', (e) => { e.preventDefault(); isDrawing = false; }, {passive: false});

    // ========== PDF 生成邏輯 ==========
    function generatePDF() {
        // 同步所有輸入值到 HTML 屬性
        document.querySelectorAll('input, select').forEach(el => {
            el.setAttribute('value', el.value);
        });

        const element = document.getElementById('form-to-pdf');
        const nameInput = document.querySelector('input[type="text"]');
        const fileName = nameInput.value ? `入會申請書_${nameInput.value}.pdf` : '入會申請書.pdf';

        const isMobile = /android|ios|iphone|ipad|ipot/.test(navigator.userAgent.toLowerCase());

        if (isMobile) {
            generatePDFMobile(element, fileName);
        } else {
            generatePDFDesktop(element, fileName);
        }
    }

    // 📱 手機版 PDF 生成 - 使用單次 canvas 捕捉 + 正確分頁
    function generatePDFMobile(element, fileName) {
           const opt = {
    margin: [0, 0, 0, 0],
    filename: fileName,
    image: { type: 'jpeg', quality: 1 },
    html2canvas: {
        scale: 1.2,
        windowWidth: 794,
        // 為了確保完整捕捉，這裡可以手動指定一個很大的高度
        windowHeight: 5000 
    },
    jsPDF: {
        unit: 'mm',
        // 自定義頁面尺寸：[寬度, 超長的高度]
        format: [210, 5000], 
        orientation: 'portrait'
    }
};
            jsPDF: {
                unit: 'mm',
                format: 'a4',
                orientation: 'portrait',
                compress: false                // 禁用壓縮，確保正確分頁
            },
            pagebreak: { mode: ['css', 'legacy'], before: '.page-break' }
        };

        html2pdf()
            .set(opt)
            .from(element)
            .save()
            .catch(err => {
                console.error('PDF 生成失敗:', err);
                alert('PDF 生成失敗，請重試');
            });
    }

    // 💻 桌面版 PDF 生成 (保持原樣)
    function generatePDFDesktop(element, fileName) {
        const opt = {
            margin: 10,
            filename: fileName,
            image: { type: 'jpeg', quality: 1 },
            html2canvas: { 
                scale: 2, 
                useCORS: true, 
                ignoreElements: (el) => el.id === 'action-buttons-area' 
            },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save();
    }
</script>
</body>
</html>

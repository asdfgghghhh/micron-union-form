<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣美光記憶體股份有限公司企業工會 - 入會申請書</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }

        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            .print-container { box-shadow: none !important; margin: 0 !important; padding: 0 !important; width: 100% !important; }
            input, select { border: none !important; background: transparent !important; }
            table, th, td { border: 1px solid #000 !important; }
            .watermark-bg { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .date-input { border-bottom: none !important; } /* 列印時隱藏虛線 */
        }

        .form-input { width: 100%; height: 100%; padding: 8px; outline: none; background: transparent; min-height: 40px; }
        table { border-collapse: collapse; width: 100%; position: relative; z-index: 10; }
        th, td { border: 1px solid #374151; text-align: center; vertical-align: middle; }
        th { background-color: transparent; font-weight: 500; white-space: nowrap; padding: 8px; width: 12%; }

        /* 日期輸入樣式 - 改為空白方便填寫 */
        .date-input {
            width: 50px;
            text-align: center;
            border: none;
            border-bottom: 1px dashed #374151;
            background: transparent;
            outline: none;
            padding: 2px;
            font-size: 1rem;
        }

        .watermark-container { position: relative; }
        .watermark-bg { position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%); opacity: 0.05; font-size: 150px; font-weight: bold; z-index: 1; pointer-events: none; user-select: none; }
        #signature-pad { border: 1px dashed #9ca3af; background-color: #f9fafb; cursor: crosshair; touch-action: none; }
    </style>
</head>
<body class="py-8 px-4 flex justify-center items-start min-h-screen">

    <div class="print-container bg-white shadow-xl rounded-lg max-w-4xl w-full p-8 relative">
        
        <div class="no-print absolute top-4 right-4 flex gap-2">
            <button onclick="clearSignature()" class="px-4 py-2 bg-red-100 text-red-600 rounded hover:bg-red-200 transition text-sm font-medium">清除簽名</button>
            <button onclick="window.print()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition text-sm font-medium shadow">列印 / 另存 PDF</button>
        </div>

        <div class="text-center mb-8 mt-4 relative z-10">
            <h1 class="text-3xl font-bold tracking-widest mb-4">台灣美光記憶體股份有限公司企業工會</h1>
            <h2 class="text-2xl font-medium tracking-widest mb-4">入會申請書</h2>
            
            <div class="text-right mr-4 mb-4 font-medium">
                中華民國 
                <input type="text" class="date-input" placeholder="___"> 年 
                <input type="text" class="date-input" placeholder="___"> 月 
                <input type="text" class="date-input" placeholder="___"> 日
            </div>
            
            <div class="text-right text-sm mr-4">序<span class="inline-block w-24 border-b border-gray-400 ml-2"></span></div>
        </div>

        <div class="watermark-container border border-gray-700">
            <div class="watermark-bg flex flex-col items-center">
                <span style="font-size: 200px;">m</span>
                <span style="font-size: 40px; margin-top: -60px;">Micron Labor Union</span>
            </div>

            <table>
                <tbody>
                    <tr>
                        <th class="tracking-widest">姓　　名</th>
                        <td><input type="text" class="form-input" placeholder="請輸入姓名"></td>
                        <th class="tracking-widest">性　　別</th>
                        <td>
                            <select class="form-input text-center">
                                <option value="" disabled selected>請選擇</option>
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </td>
                        <th>出生<br>年月日</th>
                        <td><input type="date" class="form-input text-center"></td>
                    </tr>
                    <tr>
                        <th class="tracking-widest">工　　號</th>
                        <td><input type="text" class="form-input" placeholder="請輸入工號"></td>
                        <th>公司分機</th>
                        <td><input type="text" class="form-input" placeholder="請輸入分機"></td>
                        <th class="tracking-widest">單　　位</th>
                        <td><input type="text" class="form-input" placeholder="請輸入單位"></td>
                    </tr>
                    <tr>
                        <th class="tracking-widest">戶籍住址</th>
                        <td colspan="5"><input type="text" class="form-input text-left" placeholder="請輸入戶籍住址"></td>
                    </tr>
                    <tr>
                        <th class="tracking-widest">通訊住址</th>
                        <td colspan="5"><input type="text" class="form-input text-left" placeholder="請輸入通訊住址"></td>
                    </tr>
                    <tr>
                        <th class="tracking-widest">通訊電話</th>
                        <td colspan="2"><input type="tel" class="form-input text-left" placeholder="請輸入通訊電話"></td>
                        <th class="tracking-widest">手機號碼</th>
                        <td colspan="2"><input type="tel" class="form-input text-left" placeholder="請輸入手機號碼"></td>
                    </tr>
                    <tr>
                        <td colspan="6" class="text-left p-6 relative">
                            <p class="leading-relaxed text-base mb-6 font-medium">
                                本人同意按工會章程行使權利與義務並同意於加入企業工會成為會員之日起<br>
                                由台灣美光記憶體股份有限公司依據工會法於每月薪資代扣工會經常會費(按章<br>
                                程規定之會費)，且於本人退會或離開美光後將停止此代扣作業
                            </p>
                            <div class="flex justify-end items-end mt-12 gap-4">
                                <span class="font-medium text-lg mb-4">申請人：</span>
                                <div class="flex flex-col items-center">
                                    <canvas id="signature-pad" width="300" height="120" class="rounded"></canvas>
                                    <span class="text-sm text-gray-500 mt-2 no-print">(請在此處簽名)</span>
                                </div>
                                <span class="font-medium text-lg mb-4">(簽章)</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        ctx.strokeStyle = '#000000'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round'; ctx.lineCap = 'round';

        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; const c = getCoords(e); ctx.beginPath(); ctx.moveTo(c.x, c.y); });
        canvas.addEventListener('mousemove', (e) => { if (!isDrawing) return; const c = getCoords(e); ctx.lineTo(c.x, c.y); ctx.stroke(); });
        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; const c = getCoords(e); ctx.beginPath(); ctx.moveTo(c.x, c.y); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (!isDrawing) return; const c = getCoords(e); ctx.lineTo(c.x, c.y); ctx.stroke(); }, {passive: false});
        canvas.addEventListener('touchend', () => isDrawing = false);

        function clearSignature() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    </script>
</body>
</html>

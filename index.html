<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣美光記憶體股份有限公司企業工會 - 入會申請系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        .pdf-table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        .pdf-table th, .pdf-table td { border: 1px solid #374151; padding: 12px; vertical-align: middle; }
        .pdf-table th { background-color: #f9fafb; font-weight: 700; width: 15%; text-align: center; }
        .form-input { width: 100%; border: none; outline: none; background: transparent; }
        
        #pdf-export-template { width: 794px; background-color: #ffffff; padding: 40px; box-sizing: border-box; overflow: hidden; }
        
        /* 簽名板樣式 */
        #signature-pad { border: 1px dashed #9ca3af; background-color: #f9fafb; cursor: crosshair; width: 300px; height: 120px; touch-action: none; display: block; }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div id="form-zone" class="bg-white shadow-xl rounded-lg max-w-4xl w-full p-6">
        <h1 class="text-2xl font-bold text-center mb-6">台灣美光記憶體股份有限公司企業工會 - 入會申請書</h1>
        
        <!-- 表格欄位 -->
        <table class="pdf-table mb-6">
            <tr><th>姓　　名</th><td><input type="text" id="d-name" class="form-input"></td><th>性　　別</th><td><select id="d-gender" class="form-input"><option value="男">男</option><option value="女">女</option></select></td><th>出生年月日</th><td><input type="date" id="d-birth" class="form-input"></td></tr>
            <tr><th>工　　號</th><td><input type="text" id="d-id" class="form-input"></td><th>公司分機</th><td><input type="text" id="d-ext" class="form-input"></td><th>單　　位</th><td><input type="text" id="d-unit" class="form-input"></td></tr>
            <tr><th>戶籍住址</th><td colspan="5"><input type="text" id="d-raddr" class="form-input"></td></tr>
            <tr><th>通訊住址</th><td colspan="5"><input type="text" id="d-caddr" class="form-input"></td></tr>
            <tr><th>通訊電話</th><td colspan="2"><input type="text" id="d-phone" class="form-input"></td><th>手機號碼</th><td colspan="2"><input type="text" id="d-mobile" class="form-input"></td></tr>
        </table>

        <!-- 簽名區 UI -->
        <div class="mb-6">
            <label class="font-bold block mb-2">請於下方親筆簽名：</label>
            <canvas id="signature-pad"></canvas>
            <button onclick="clearSignature()" class="mt-2 px-4 py-1 bg-gray-200 rounded text-sm hover:bg-gray-300">清除簽名</button>
        </div>

        <button onclick="executePrint()" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-lg hover:bg-emerald-700">產生並下載 PDF</button>
    </div>

    <!-- 隱藏的 PDF 生成模板 -->
    <div style="position: absolute; left: -9999px;">
        <div id="pdf-export-template">
            <h1 style="text-align: center; font-size: 24px; font-weight: bold; margin-bottom: 30px;">台灣美光記憶體股份有限公司企業工會 - 入會申請書</h1>
            <table class="pdf-table" style="margin-bottom: 40px;">
                <tr><th>姓　　名</th><td id="p-name"></td><th>性　　別</th><td id="p-gender"></td><th>出生年月日</th><td id="p-birth"></td></tr>
                <tr><th>工　　號</th><td id="p-id"></td><th>公司分機</th><td id="p-ext"></td><th>單　　位</th><td id="p-unit"></td></tr>
                <tr><th>戶籍住址</th><td colspan="5" id="p-raddr"></td></tr>
                <tr><th>通訊住址</th><td colspan="5" id="p-caddr"></td></tr>
                <tr><th>通訊電話</th><td colspan="2" id="p-phone"></td><th>手機號碼</th><td colspan="2" id="p-mobile"></td></tr>
            </table>
            <!-- PDF 裡的簽名顯示區 -->
            <div style="margin-top: 50px;">
                <p style="font-weight: bold; font-size: 18px;">申請人簽名：</p>
                <img id="pdf-signature-img" style="width: 300px; height: 120px; border-bottom: 2px solid #000; object-fit: contain; margin-top: 10px;">
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d');
        let isDrawing = false, hasSigned = false;

        // 簽名板滑鼠事件
        canvas.addEventListener('mousedown', (e) => { isDrawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX, e.offsetY); });
        canvas.addEventListener('mousemove', (e) => { if(isDrawing) { ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); hasSigned = true; } });
        window.addEventListener('mouseup', () => isDrawing = false);

        function clearSignature() { ctx.clearRect(0, 0, canvas.width, canvas.height); hasSigned = false; }

        function executePrint() {
            // 同步表單內容
            ['name', 'gender', 'birth', 'id', 'ext', 'unit', 'raddr', 'caddr', 'phone', 'mobile'].forEach(id => {
                document.getElementById('p-' + id).innerText = document.getElementById('d-' + id).value;
            });

            // 將簽名轉為 Base64 並填入隱藏範本
            const sigImg = document.getElementById('pdf-signature-img');
            if (hasSigned) {
                sigImg.src = canvas.toDataURL();
            } else {
                sigImg.src = ""; // 若未簽名則保持空白
            }

            // PDF 匯出設定 (強制鎖定 A4 寬度以防止溢出)
            html2pdf().set({
                margin: 0.5,
                filename: '美光工會入會申請書.pdf',
                html2canvas: { scale: 2, useCORS: true, windowWidth: 794 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            }).from(document.getElementById('pdf-export-template')).save();
        }
    </script>
</body>
</html>

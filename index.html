<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工會入會申請書</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* 網頁版面與 PDF 版面完全分開 */
        #pdf-export-zone {
            position: fixed;
            top: 0;
            left: -9999px; /* 不用 display:none，改用移出視窗外，讓瀏覽器持續渲染 */
            width: 794px; /* 固定 A4 寬度 */
            padding: 40px;
            background: white;
            z-index: 100;
        }
        .a4-table { width: 100%; border-collapse: collapse; table-layout: fixed; border: 1px solid black; }
        .a4-table td, .a4-table th { border: 1px solid black; padding: 10px; height: 50px; }
        .a4-table th { background: #f3f4f6; width: 15%; }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div id="web-ui" class="max-w-2xl mx-auto bg-white p-6 shadow-md rounded">
        <h1 class="text-xl font-bold mb-4">入會申請系統</h1>
        <input type="text" id="i-name" placeholder="姓名" class="w-full border p-2 mb-2">
        <input type="text" id="i-id" placeholder="工號" class="w-full border p-2 mb-2">
        <canvas id="canvas" class="border w-full h-32 mb-4 bg-gray-50"></canvas>
        <button onclick="savePDF()" class="w-full bg-blue-600 text-white p-3 font-bold">下載 PDF</button>
    </div>

    <div id="pdf-export-zone">
        <h1 style="text-align:center; font-size: 24px; font-weight:bold;">台灣美光記憶體股份有限公司企業工會</h1>
        <table class="a4-table mt-6">
            <tr><th>姓名</th><td id="p-name"></td><th>工號</th><td id="p-id"></td></tr>
        </table>
        <div class="mt-8">
            <p>簽名：</p>
            <img id="p-sig" style="width: 200px; height: 80px; border-bottom: 1px solid black;">
        </div>
    </div>

    <script>
        // 簽名板
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let draw = false;
        canvas.onmousedown = () => draw = true;
        canvas.onmouseup = () => draw = false;
        canvas.onmousemove = (e) => { if(draw) ctx.fillRect(e.offsetX, e.offsetY, 2, 2); };

        async function savePDF() {
            // 填入 PDF 專用區
            document.getElementById('p-name').innerText = document.getElementById('i-name').value;
            document.getElementById('p-id').innerText = document.getElementById('i-id').value;
            document.getElementById('p-sig').src = canvas.toDataURL();

            // 轉譯
            const element = document.getElementById('pdf-export-zone');
            const opt = {
                margin: 0,
                filename: '申請書.pdf',
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'px', format: [794, 1123], orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>
</html>

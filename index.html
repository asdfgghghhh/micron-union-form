<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣美光記憶體股份有限公司企業工會 - 入會申請系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }

        .form-input { width: 100%; height: 100%; padding: 10px 8px; outline: none; background: transparent; min-height: 42px; border: none !important; }
        .pdf-table { border-collapse: collapse; width: 100%; position: relative; z-index: 10; table-layout: fixed; }
        .pdf-table th, .pdf-table td { border: 1px solid #374151; text-align: center; vertical-align: middle; height: 44px; }
        .pdf-table th { background-color: #f9fafb; font-weight: 700; color: #1f2937; white-space: nowrap; padding: 6px; width: 13%; font-size: 14px; }
        .pdf-table td { background-color: #ffffff; text-align: left; }
        
        .watermark-container { position: relative; overflow: hidden; }
        .watermark-bg { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); opacity: 0.035; font-weight: bold; color: #000; z-index: 1; pointer-events: none; white-space: nowrap; user-select: none; text-align: center; width: 100%; }
        
        #signature-pad { border: 1px dashed #9ca3af; background-color: #f9fafb; cursor: pointer; width: 300px; height: 120px; display: block; }
        #modal-signature-pad { background-color: #ffffff; cursor: crosshair; touch-action: none; width: 100%; height: 100%; }
        
        /* 修正 PDF 隱藏容器，改用 fixed 脫離文檔流但保持渲染屬性 */
        .pdf-hidden-container {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -9999;
            opacity: 0;
            pointer-events: none;
            overflow: hidden;
            width: 794px;
        }
    </style>
</head>
<body class="py-4 px-2 md:py-8 md:px-4 flex flex-col justify-center items-center min-h-screen">

    <div id="form-zone" class="bg-white shadow-xl rounded-lg max-w-4xl w-full p-4 md:p-10 relative">
        <!-- 頁面內容保持不變 -->
        <div class="text-center mb-6 pt-2">
            <h1 class="text-xl md:text-3xl font-bold tracking-widest text-gray-900 mb-2">台灣美光記憶體股份有限公司企業工會</h1>
            <h2 class="text-lg md:text-2xl font-bold tracking-widest text-gray-800">入會申請書</h2>
        </div>

        <!-- 簡化輸入區塊示意，請保持原有的結構 -->
        <div class="block md:hidden space-y-4 mb-6">
            <!-- (原有的輸入欄位) -->
            <div><label class="block text-sm font-bold text-gray-700">姓 名</label><input type="text" id="m-name" class="w-full border border-gray-300 rounded p-2" oninput="syncData('m-name', 'd-name')"></div>
        </div>

        <div class="hidden md:block watermark-container border border-gray-700 rounded-sm mb-6">
            <table class="pdf-table">
                <!-- (原有的表格欄位) -->
            </table>
        </div>

        <button id="btn-pdf" onclick="executePrint()" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-lg shadow">儲存 / 生成完美 PDF</button>
    </div>

    <!-- 修正後的隱藏 PDF 模板 -->
    <div id="pdf-export-template" class="pdf-hidden-container">
        <div style="background-color: #ffffff; padding: 40px; width: 794px;">
            <h1 style="text-align: center; font-size: 24px;">台灣美光記憶體股份有限公司企業工會</h1>
            <h2 style="text-align: center; font-size: 18px;">入會申請書</h2>
            <table class="pdf-table" style="width: 100%;">
                <tr><th>姓 名</th><td id="p-name"></td></tr>
                <!-- 其他欄位同上 -->
            </table>
            <div style="margin-top: 20px;">
                <img id="pdf-signature-img" style="width: 250px; height: 100px; object-fit: contain;" src="" alt="">
            </div>
        </div>
    </div>

    <script>
        // 變數與簽名邏輯保持原樣...
        let hasSigned = false;

        async function executePrint() {
            // 1. 同步數據
            document.getElementById('p-name').innerText = document.getElementById('d-name').value || document.getElementById('m-name').value || '';
            
            // 2. 處理簽名
            const sigImg = document.getElementById('pdf-signature-img');
            if (hasSigned) {
                sigImg.src = document.getElementById('signature-pad').toDataURL();
            }

            // 3. 關鍵修正：延遲等待渲染，確保 DOM 樣式已應用
            const btn = document.getElementById('btn-pdf');
            btn.innerText = "PDF 生成中...";
            
            await new Promise(resolve => setTimeout(resolve, 500));

            const element = document.getElementById('pdf-export-template');
            const opt = {
                margin: 0.3,
                filename: '美光工會入會申請書.pdf',
                image: { type: 'jpeg', quality: 1.0 },
                html2canvas: { scale: 2, useCORS: true, logging: false },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                btn.innerText = "儲存 / 生成完美 PDF";
            });
        }
        
        function syncData(src, tgt) { /* 同步邏輯 */ }
    </script>
</body>
</html>

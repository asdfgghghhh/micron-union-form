<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣美光記憶體股份有限公司企業工會 - 入會申請系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }

        @media print {
            @page { size: portrait; margin: 0; }
            body { background-color: white; margin: 1.0cm; max-height: 100vh; overflow: hidden; }
            .no-print { display: none !important; }
            .print-container { box-shadow: none !important; margin: 0 !important; padding: 0 !important; width: 100% !important; max-width: 100% !important; page-break-inside: avoid; break-inside: avoid; }
            .mobile-form-view { display: none !important; }
            .desktop-table-view { display: block !important; }
            input, select { border: none !important; background: transparent !important; appearance: none; -webkit-appearance: none; }
            table, th, td { border: 1px solid #000 !important; }
            .watermark-bg { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .print-compact { padding: 1rem !important; margin-top: -1px !important; }
            .print-space { margin-bottom: 0.75rem !important; margin-top: 1.5rem !important; }
        }

        .form-input { width: 100%; height: 100%; padding: 8px; outline: none; background: transparent; min-height: 40px; }
        table { border-collapse: collapse; width: 100%; position: relative; z-index: 10; }
        th, td { border: 1px solid #374151; text-align: center; vertical-align: middle; }
        th { background-color: transparent; font-weight: 500; white-space: nowrap; padding: 8px; width: 12%; }
        .watermark-container { position: relative; }
        
        .watermark-bg {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); opacity: 0.04;
            font-size: 150px; font-weight: bold; color: #000; z-index: 1; pointer-events: none; white-space: nowrap; user-select: none;
        }
        #signature-pad { border: 1px dashed #9ca3af; background-color: #f9fafb; cursor: crosshair; touch-action: none; max-width: 100%; }
    </style>
</head>
<body class="py-4 px-2 md:py-8 md:px-4 flex flex-col justify-center items-center min-h-screen">

    <div id="form-zone" class="print-container bg-white shadow-xl rounded-lg max-w-4xl w-full p-4 md:p-8 relative">
        
        <div class="no-print hidden md:flex absolute top-4 right-4 gap-2">
            <button onclick="clearSignature()" class="px-4 py-2 bg-red-100 text-red-600 rounded hover:bg-red-200 transition text-sm font-medium">清除簽名</button>
            <button onclick="executePrint()" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition text-sm font-medium shadow">儲存 / 列印為 PDF</button>
        </div>

        <div class="text-center mb-4 md:mb-6 mt-2 md:mt-4 relative z-10">
            <h1 class="text-xl md:text-3xl font-bold tracking-widest mb-1 md:mb-3">台灣美光記憶體股份有限公司企業工會</h1>
            <h2 class="text-lg md:text-2xl font-medium tracking-widest flex justify-center items-end gap-16"><span>入會申請書</span></h2>
            <div class="text-right text-sm mr-4 mt-1">序<span class="inline-block w-24 border-b border-gray-400 ml-2"></span></div>
        </div>

        <div class="mobile-form-view block md:hidden space-y-4 no-print">
            <div class="bg-gray-50 p-4 rounded-lg space-y-3 border border-gray-200">
                <div><label class="block text-sm font-medium text-gray-700 mb-1">姓 名</label><input type="text" id="m-name" class="w-full border border-gray-300 rounded p-2 text-base bg-white" placeholder="請輸入姓名" oninput="syncData('m-name', 'd-name')"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">性 別</label><select id="m-gender" class="w-full border border-gray-300 rounded p-2 text-base bg-white" onchange="syncData('m-gender', 'd-gender')"><option value="" disabled selected>請選擇</option><option value="男">男</option><option value="女">女</option></select></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">出生年月日</label><input type="date" id="m-birth" class="w-full border border-gray-300 rounded p-2 text-base bg-white" onchange="syncData('m-birth', 'd-birth')"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">工 號</label><input type="text" id="m-id" class="w-full border border-gray-300 rounded p-2 text-base bg-white" placeholder="請輸入工號" oninput="syncData('m-id', 'd-id')"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">公司分機</label><input type="text" id="m-ext" class="w-full border border-gray-300 rounded p-2 text-base bg-white" placeholder="請輸入分機" oninput="syncData('m-ext', 'd-ext')"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">單 位</label><input type="text" id="m-unit" class="w-full border border-gray-300 rounded p-2 text-base bg-white" placeholder="請輸入單位" oninput="syncData('m-unit', 'd-unit')"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">戶籍住址</label><input type="text" id="m-raddr" class="w-full border border-gray-300 rounded p-2 text-base bg-white" placeholder="請輸入戶籍住址" oninput="syncData('m-raddr', 'd-raddr')"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">通訊住址</label><input type="text" id="m-caddr" class="w-full border border-gray-300 rounded p-2 text-base bg-white" placeholder="請輸入通訊住址" oninput="syncData('m-caddr', 'd-caddr')"></div>
                <div><label class="block text-sm font-medium text-gray-700 mb-1">通訊電話</label><input type="tel" id="m-phone" class="w-full border border-gray-300 rounded p-2 text-base bg-white" placeholder="
